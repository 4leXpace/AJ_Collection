<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive Music Library</title>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#0b1020;color:#fff}
header{text-align:center;padding:48px 20px}
.container{max-width:1280px;margin:auto;padding:20px}
input{width:100%;padding:14px;border-radius:12px;border:none;background:#1f2937;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;margin-top:24px}
.card{background:#151c33;border-radius:20px;overflow:hidden}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover;background:#1f2937}
.content{padding:20px}
a{color:#dbeafe}
</style></head><body>
<header><h1>Archive Music Library</h1><p>Collection Aadam Jacobs</p></header>
<div class="container"><input id="search" placeholder="Rechercher un artiste..."><div id="grid" class="grid"></div></div>
<script>
let allArtists=[];
function render(){
 const q=document.getElementById('search').value.toLowerCase();
 const grid=document.getElementById('grid'); grid.innerHTML='';
 allArtists.filter(a=>a.artist.toLowerCase().includes(q)).forEach(item=>{
  const card=document.createElement('div'); card.className='card';
  const links=item.links.slice(0,8).map(l=>`<li><a href="${l.url}" target="_blank">${l.title}</a></li>`).join('');
  card.innerHTML=`<img src="${item.image}" onerror="this.src='https://archive.org/images/notfound.png'">
  <div class="content"><h2>${item.artist}</h2><p>${item.links.length} enregistrement(s)</p><ul>${links}</ul></div>`;
  grid.appendChild(card);
 });
}
fetch('artists.json').then(r=>r.json()).then(data=>{allArtists=data;render();});
document.getElementById('search').addEventListener('input',render);
</script></body></html>
